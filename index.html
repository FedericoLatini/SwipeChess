<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SwipeChess</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Poppins', sans-serif; text-align: center; background-color: #121212; color: #ffffff; margin: 0; padding: 20px; display: flex; flex-direction: column; min-height: 95vh; user-select: none; -webkit-user-select: none; overflow-x: hidden; }
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; position: absolute; width: 100%; top:0; left:0; height: 100%; box-sizing: border-box; padding: 20px;}
        .screen.active { display: flex; animation: slideUpFade 0.4s ease-out forwards; }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        h1 { font-size: 3.5em; margin-bottom: 5px; font-weight: 800; background: linear-gradient(90deg, #ffffff, #888888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; line-height: 1; }
        .subtitle { font-size: 1.1em; color: #aaaaaa; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px;}
        
        .btn { width: 100%; max-width: 280px; padding: 18px; font-size: 18px; cursor: pointer; border: none; border-radius: 50px; font-weight: 600; box-shadow: 0 8px 15px rgba(0,0,0,0.2); transition: all 0.2s ease; margin: 10px 0; text-transform: uppercase; letter-spacing: 1px; outline: none; }
        .btn:disabled { background: #444; color: #888; cursor: not-allowed; }
        .btn-primary { background: linear-gradient(135deg, #007aff, #005bb5); color: white; }
        .btn-secondary { background-color: #2c2c2e; color: #ffffff; border: 1px solid #3a3a3c; }
        
        .stats { display: flex; justify-content: space-between; width: 100%; max-width: 400px; margin: 0 auto 25px auto; font-size: 1.1em; font-weight: 600; background: #1e1e1e; padding: 15px 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); border: 1px solid #2c2c2e; z-index: 10; position: relative;}
        .game-area-wrapper { position: relative; width: 100%; max-width: 400px; margin: 0 auto; height: 450px; }
        
        #swipe-card { width: 100%; box-sizing: border-box; position: relative; background: #1e1e1e; border-radius: 12px; padding: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); border: 1px solid #2c2c2e; touch-action: none; cursor: grab; z-index: 10; }
        #board { width: 100%; border-radius: 4px; overflow: hidden; pointer-events: none; }
        
        .swipe-feedback-icon { position: absolute; top: 40%; left: 50%; width: 140px; height: 140px; transform: translate(-50%, -50%) scale(0.5); opacity: 0; pointer-events: none; z-index: 100; }
        #white-king-icon { filter: drop-shadow(0px 0px 15px rgba(255, 255, 255, 0.9)); }
        #black-king-icon { filter: drop-shadow(0px 0px 20px rgba(255, 255, 255, 0.8)) drop-shadow(0px 0px 5px rgba(0,0,0,0.8)); }
        
        .badge { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 8px 16px; border-radius: 20px; letter-spacing: 1px; background: #2c2c2e; border: 1px solid #3a3a3c; font-size: 0.8em; color: #aaa;}
        .badge svg { width: 16px; height: 16px; stroke-width: 2.5px; }
        
        #message { height: 40px; margin-top: 15px; font-size: 1.4em; font-weight: 800; display: flex; align-items: center; justify-content: center; z-index: 10;}
        .success { color: #32d74b; } .error { color: #ff453a; }
        .highlight-move { box-shadow: inset 0 0 0 50px rgba(50, 215, 75, 0.4) !important; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <h1>SWIPE<br>CHESS</h1>
        <div class="subtitle">Eval Instinct Trainer</div>
        <div style="background: #1e1e1e; padding: 20px 40px; border-radius: 20px; border: 1px solid #2c2c2e; margin-bottom: 30px;">
            <div style="font-size: 0.7em; color: #888; text-transform: uppercase;">PERSONAL BEST</div>
            <div id="home-best-score" style="font-size: 2.5em; font-weight: 800; color: #007aff;">0</div>
        </div>
        <button id="start-btn" class="btn btn-primary" onclick="startGame()" disabled>LOADING DB...</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="stats">
            <div class="score-box"><div>SCORE</div><div id="score">0</div></div>
            <div class="score-box"><div>BEST</div><div id="game-best-score">0</div></div>
        </div>
        <div class="game-area-wrapper">
            <img id="white-king-icon" class="swipe-feedback-icon" src="https://upload.wikimedia.org/wikipedia/commons/4/42/Chess_klt45.svg">
            <img id="black-king-icon" class="swipe-feedback-icon" src="https://upload.wikimedia.org/wikipedia/commons/f/f0/Chess_kdt45.svg">
            <div id="swipe-card">
                <div id="board"></div>
                <div style="display:flex; justify-content:space-between; margin-top:15px;">
                    <span class="badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> BLACK</span>
                    <span class="badge">WHITE <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg></span>
                </div>
                <div id="last-move" style="margin-top:10px; color:#aaa;">Last Move: -</div>
            </div>
        </div>
        <div id="message"></div>
    </div>

    <div id="game-over-screen" class="screen">
        <h1 style="color: #ff453a;">GAME OVER</h1>
        <div id="game-over-reason" style="margin-bottom:20px; font-weight:600;"></div>
        <div style="background: #1e1e1e; padding: 25px; border-radius: 20px; margin-bottom: 25px; border: 1px solid #2c2c2e;">
            <div style="font-size: 0.7em; color: #888;">FINAL SCORE</div>
            <div id="final-score" style="font-size: 3em; font-weight: 800;">0</div>
        </div>
        <button class="btn btn-primary" onclick="startGame()">TRY AGAIN</button>
        <button class="btn btn-secondary" onclick="goHome()">HOME</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <script>
        let database = [], currentPosIndex = 0, score = 0, bestScore = parseInt(localStorage.getItem("swipeChessBestScore")) || 0;
        let board = null, isDragging = false, startX = 0, currentX = 0, isProcessingSwipe = false;
        
        // Funzione professionale per mescolare l'array (Fisher-Yates Shuffle)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        async function loadDatabase() {
            try {
                const response = await fetch('./puzzles.json?v=' + Date.now());
                if (!response.ok) throw new Error("404 Not Found");
                database = await response.json();
                
                document.getElementById('start-btn').innerText = "PLAY NOW";
                document.getElementById('start-btn').disabled = false;
            } catch (e) { 
                document.getElementById('start-btn').innerText = "DB ERROR"; 
                console.error(e);
            }
        }

        $(document).ready(() => { updateBestScoreDisplays(); setupSwipeListeners(); loadDatabase(); });

        function switchScreen(id) {
            $('.screen').removeClass('active');
            $('#' + id).addClass('active');
        }

        function updateBestScoreDisplays() {
            document.getElementById('home-best-score').innerText = bestScore;
            document.getElementById('game-best-score').innerText = bestScore;
        }

        function startGame() {
            score = 0; currentPosIndex = 0; isProcessingSwipe = false;
            
            // Randomizzazione SICURA ad ogni nuova partita
            shuffleArray(database);
            
            document.getElementById('score').innerText = "0";
            document.getElementById('message').innerText = "";
            document.getElementById('swipe-card').style.transition = 'none';
            document.getElementById('swipe-card').style.transform = 'translateX(0) rotate(0)';
            document.getElementById('swipe-card').style.opacity = '1';
            updateBestScoreDisplays();
            switchScreen('game-screen');
            setTimeout(() => {
                if (!board) board = Chessboard('board', { position: 'start', pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png' });
                board.resize(); loadPosition();
            }, 100);
        }

        function loadPosition() {
            if(isProcessingSwipe) return;
            const card = document.getElementById('swipe-card');
            card.style.transition = 'none';
            card.style.transform = 'translateX(0) rotate(0)';
            card.style.opacity = '1';
            document.getElementById('white-king-icon').style.opacity = 0;
            document.getElementById('black-king-icon').style.opacity = 0;
            
            if(currentPosIndex >= database.length) { 
                shuffleArray(database); 
                currentPosIndex = 0; 
            }
            const pos = database[currentPosIndex];
            
            // Logica a prova di bomba per parsare la mossa (con o senza trattino)
            const cleanMove = pos.lastMove.replace('-', '').trim();
            const fromSq = cleanMove.substring(0, 2);
            const toSq = cleanMove.substring(2, 4);
            const promo = cleanMove.length > 4 ? cleanMove.substring(4, 5) : undefined;
            
            const game = new Chess(pos.fen);
            const moveResult = game.move({ from: fromSq, to: toSq, promotion: promo });
            
            // Se la mossa è valida, mostra il FEN successivo, altrimenti mostra quello base
            if (moveResult) {
                board.position(game.fen(), false);
            } else {
                board.position(pos.fen, false);
                console.warn("Mossa illegale nel DB per il FEN fornito:", pos.lastMove);
            }
            
            document.getElementById('last-move').innerHTML = `Last Move: <b>${fromSq}-${toSq}</b>`;
            document.getElementById('message').style.opacity = 0;
            
            // Evidenzia caselle corrette
            $('.square-55d63').removeClass('highlight-move');
            $('.square-' + fromSq).addClass('highlight-move');
            $('.square-' + toSq).addClass('highlight-move');
            
            setTimeout(() => { card.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease-out'; }, 50);
        }

        function setupSwipeListeners() {
            const card = document.getElementById('swipe-card');
            const whiteIcon = document.getElementById('white-king-icon');
            const blackIcon = document.getElementById('black-king-icon');

            const onStart = (x) => { if(isProcessingSwipe) return; isDragging = true; startX = x; card.style.transition = 'none'; };
            const onMove = (x) => {
                if(!isDragging || isProcessingSwipe) return;
                currentX = x; let dx = currentX - startX;
                card.style.transform = `translateX(${dx}px) rotate(${dx * 0.05}deg)`;
                card.style.opacity = 1 - Math.min(Math.abs(dx) / 150, 0.7);
                let prog = Math.min(Math.abs(dx) / 100, 1);
                if(dx > 0) { whiteIcon.style.opacity = prog; whiteIcon.style.transform = `translate(-50%, -50%) scale(${0.5 + prog})`; blackIcon.style.opacity = 0; }
                else { blackIcon.style.opacity = prog; blackIcon.style.transform = `translate(-50%, -50%) scale(${0.5 + prog})`; whiteIcon.style.opacity = 0; }
            };
            const onEnd = () => {
                if(!isDragging || isProcessingSwipe) return; isDragging = false;
                let dx = currentX - startX;
                if(Math.abs(dx) > 80) {
                    isProcessingSwipe = true;
                    let guess = dx > 0 ? 'white' : 'black';
                    card.style.transition = 'all 0.3s ease-in';
                    card.style.transform = `translateX(${(dx > 0 ? 1 : -1) * window.innerWidth}px) rotate(${(dx > 0 ? 1 : -1) * 30}deg)`;
                    card.style.opacity = 0;
                    setTimeout(() => makeGuess(guess), 250);
                } else {
                    card.style.transition = 'all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                    card.style.transform = 'translateX(0) rotate(0)';
                    card.style.opacity = 1;
                    whiteIcon.style.opacity = 0; blackIcon.style.opacity = 0;
                }
            };

            card.addEventListener('touchstart', e => onStart(e.touches[0].clientX), {passive:true});
            card.addEventListener('touchmove', e => { if(e.cancelable) e.preventDefault(); onMove(e.touches[0].clientX); }, {passive:false});
            card.addEventListener('touchend', onEnd);
            card.addEventListener('mousedown', e => onStart(e.pageX));
            window.addEventListener('mousemove', e => onMove(e.pageX));
            window.addEventListener('mouseup', onEnd);
        }

        function makeGuess(guess) {
            const pos = database[currentPosIndex];
            const msg = document.getElementById('message');
            msg.style.opacity = 1;
            
            if(guess === pos.correctAnswer) {
                score++; document.getElementById('score').innerText = score;
                msg.innerText = `CORRECT! 🔥 (${pos.eval})`; msg.className = "success";
                currentPosIndex++;
                isProcessingSwipe = false;
                setTimeout(loadPosition, 800);
            } else {
                msg.innerText = `WRONG! (${pos.eval})`; msg.className = "error";
                if(score > bestScore) { bestScore = score; localStorage.setItem("swipeChessBestScore", bestScore); }
                setTimeout(() => {
                    document.getElementById('final-score').innerText = score;
                    document.getElementById('game-over-reason').innerText = `Engine Eval: ${pos.eval}`;
                    updateBestScoreDisplays();
                    switchScreen('game-over-screen');
                }, 1000);
            }
        }

        function goHome() { updateBestScoreDisplays(); switchScreen('home-screen'); }
    </script>
</body>
</html>
